<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-brand">SR<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="internship.html">Internship</a></li>
            <li><a href="certifications.html">Certifications</a></li>
            <li><a href="achievements.html">Achievements</a></li>
            <li><a href="workshop.html">Workshops</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="hamburger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container section-enter">
        <h2 class="section-title">Get In Touch</h2>
        
        <div class="contact-wrapper">
            <!-- Contact Info -->
            <div class="contact-info">
                <div class="glass-card contact-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4 style="margin-bottom: 0.2rem;">Email</h4>
                        <a href="mailto:shalinraj@example.com" style="color: var(--text-muted); font-size: 0.95rem;">shalinraj@example.com</a>
                    </div>
                </div>

                <div class="glass-card contact-item">
                    <i class="fas fa-phone-alt"></i>
                    <div>
                        <h4 style="margin-bottom: 0.2rem;">Phone</h4>
                        <a href="tel:+919876543210" style="color: var(--text-muted); font-size: 0.95rem;">+91 98765 43210</a>
                    </div>
                </div>

                <div class="glass-card contact-item">
                    <i class="fab fa-linkedin-in"></i>
                    <div>
                        <h4 style="margin-bottom: 0.2rem;">LinkedIn</h4>
                        <a href="#" style="color: var(--text-muted); font-size: 0.95rem;">linkedin.com/in/shalinraj</a>
                    </div>
                </div>

                <div class="glass-card contact-item">
                    <i class="fab fa-github"></i>
                    <div>
                        <h4 style="margin-bottom: 0.2rem;">GitHub</h4>
                        <a href="#" style="color: var(--text-muted); font-size: 0.95rem;">github.com/shalinraj</a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="glass-card">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--accent-light);">Send a Message</h3>
                <form class="contact-form" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" placeholder="How can we work together?" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
